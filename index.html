<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fine Cat Head Tracking</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eadfca;
        --bg-soft: #f6efe3;
        --panel: rgba(255, 252, 245, 0.78);
        --text: #2d332e;
        --muted: #6f746d;
        --accent: #7f7f6b;
      }

      @font-face {
        font-family: "Source Han Sans Cat";
        src: url("./fonts/SourceHanSansCN-Light.otf") format("opentype");
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100svh;
        overflow: hidden;
        display: grid;
        place-items: center;
        padding: clamp(12px, 3vw, 32px);
        padding-bottom: calc(clamp(86px, 14svh, 132px) + env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at 50% 32%, var(--bg-soft), transparent 42%),
          linear-gradient(180deg, var(--bg-soft), var(--bg));
        font-family:
          "Source Han Sans Cat", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        transition: background 180ms ease;
      }

      .stage {
        width: min(92vw, calc(100svh - clamp(118px, 18svh, 172px)), 780px);
        aspect-ratio: 1;
        display: grid;
        place-items: center;
      }

      canvas {
        width: min(100%, 640px);
        max-height: calc(100svh - clamp(128px, 20svh, 188px));
        aspect-ratio: 1;
        display: block;
        object-fit: contain;
        filter: drop-shadow(0 18px 22px rgba(86, 80, 65, 0.14));
        transform: translateZ(0);
      }

      .toolbar {
        position: fixed;
        left: max(12px, env(safe-area-inset-left));
        right: max(12px, env(safe-area-inset-right));
        bottom: max(12px, env(safe-area-inset-bottom));
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: clamp(8px, 2vw, 14px);
        width: fit-content;
        max-width: calc(100vw - 24px);
        margin-inline: auto;
        padding: clamp(9px, 2vw, 12px);
        border: 1px solid rgba(91, 84, 70, 0.13);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: 0 16px 36px rgba(84, 78, 66, 0.1);
      }

      .swatches {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(6px, 1.6vw, 8px);
        flex-wrap: wrap;
      }

      .profile-strip {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
        max-width: min(78vw, 560px);
        color: var(--text);
        font-size: clamp(12px, 2.8vw, 14px);
        line-height: 1.35;
      }

      .profile-item {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 26px;
        padding: 4px 9px;
        border: 1px solid rgba(91, 84, 70, 0.12);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.4);
        white-space: nowrap;
      }

      .profile-item strong {
        font-weight: 700;
      }

      button.swatch {
        width: clamp(24px, 7vw, 30px);
        height: clamp(24px, 7vw, 30px);
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 50%;
        padding: 0;
        cursor: pointer;
        box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.42);
      }

      button.swatch.active {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      input[type="color"] {
        width: clamp(30px, 8vw, 36px);
        height: clamp(30px, 8vw, 36px);
        border: 0;
        padding: 0;
        background: transparent;
        cursor: pointer;
      }

      .settings-button {
        position: fixed;
        top: max(14px, env(safe-area-inset-top));
        right: max(14px, env(safe-area-inset-right));
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(91, 84, 70, 0.14);
        border-radius: 50%;
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        backdrop-filter: blur(16px);
        box-shadow: 0 12px 28px rgba(84, 78, 66, 0.12);
      }

      .settings-button svg {
        width: 21px;
        height: 21px;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        padding: 18px;
        background: rgba(64, 55, 44, 0.22);
        backdrop-filter: blur(10px);
        z-index: 10;
      }

      .modal.open {
        display: grid;
      }

      .settings-panel {
        width: min(94vw, 420px);
        max-height: min(86svh, 680px);
        overflow: auto;
        display: grid;
        gap: 16px;
        padding: 18px;
        border: 1px solid rgba(91, 84, 70, 0.14);
        border-radius: 10px;
        background: rgba(255, 252, 245, 0.94);
        box-shadow: 0 28px 70px rgba(55, 47, 37, 0.18);
      }

      .settings-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .settings-head h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 720;
      }

      .icon-button {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 50%;
        background: rgba(91, 84, 70, 0.08);
        color: var(--text);
        cursor: pointer;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field label {
        font-size: 13px;
        color: var(--muted);
      }

      .field input {
        width: 100%;
        min-height: 42px;
        border: 1px solid rgba(91, 84, 70, 0.18);
        border-radius: 8px;
        padding: 9px 11px;
        background: rgba(255, 255, 255, 0.58);
        color: var(--text);
        font: inherit;
      }

      .qr-card {
        display: grid;
        justify-items: center;
        gap: 10px;
        padding: 14px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.48);
      }

      #qrCode {
        width: 164px;
        height: 164px;
        display: grid;
        place-items: center;
        padding: 8px;
        border-radius: 8px;
        background: #fff;
      }

      .qr-url {
        width: 100%;
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        overflow-wrap: anywhere;
        text-align: center;
      }

      .readout {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        clip-path: inset(50%);
        white-space: nowrap;
        pointer-events: none;
      }

      .debug-readout {
        display: grid;
        gap: 3px;
        min-width: 210px;
        font-size: 13px;
        line-height: 1.35;
        text-align: right;
      }

      .debug-readout strong {
        color: var(--accent);
        font-weight: 680;
      }

      .debug-readout span {
        color: var(--muted);
      }

      @media (max-width: 640px) {
        body {
          padding-inline: 10px;
          padding-bottom: calc(104px + env(safe-area-inset-bottom));
        }

        .stage {
          width: min(96vw, calc(100svh - 132px));
        }

        .toolbar {
          max-width: calc(100vw - 20px);
        }

        .profile-strip {
          order: -1;
          width: 100%;
          max-width: 100%;
        }

        .readout {
          text-align: left;
          min-width: 0;
        }
      }

      @media (max-height: 560px) and (orientation: landscape) {
        body {
          place-items: center;
          padding-bottom: calc(66px + env(safe-area-inset-bottom));
        }

        .stage {
          width: min(58vw, calc(100svh - 78px), 520px);
        }

        canvas {
          max-height: calc(100svh - 78px);
        }

        .toolbar {
          padding: 7px 9px;
        }
      }
    </style>
  </head>
  <body>
    <button class="settings-button" id="settingsButton" type="button" aria-label="打开设置">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6 1.65 1.65 0 0 0-.4 1.08V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-.6-1 1.65 1.65 0 0 0-1.08-.4H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-.6 1.65 1.65 0 0 0 .4-1.08V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.2.38.52.7.9.9.26.14.55.21.85.21H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51.89Z" />
      </svg>
    </button>

    <main class="stage" aria-label="mouse tracked cat">
      <canvas id="cat" width="760" height="760" aria-label="cat looking forward"></canvas>
    </main>

    <section class="toolbar" aria-label="controls">
      <div class="swatches" id="swatches" aria-label="background palette"></div>
      <input id="colorPicker" type="color" value="#eadfca" aria-label="custom background color" />
      <div class="profile-strip" id="profileStrip" aria-live="polite"></div>
      <div class="readout" aria-live="polite">
        <strong id="label">center</strong>
        <span id="detail">frame_front.webp</span>
      </div>
    </section>

    <div class="modal" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <section class="settings-panel">
        <div class="settings-head">
          <h2 id="settingsTitle">猫咪设置</h2>
          <button class="icon-button" id="closeSettings" type="button" aria-label="关闭设置">×</button>
        </div>
        <div class="field">
          <label for="catName">猫咪姓名</label>
          <input id="catName" type="text" autocomplete="off" placeholder="例如：卡门" />
        </div>
        <div class="field">
          <label for="catBirthday">出生日期</label>
          <input id="catBirthday" type="date" />
        </div>
        <div class="field">
          <label for="catPhone">电话</label>
          <input id="catPhone" type="tel" inputmode="tel" autocomplete="tel" placeholder="联系电话" />
        </div>
        <div class="qr-card">
          <div id="qrCode" aria-label="当前链接二维码"></div>
          <p class="qr-url" id="qrUrl"></p>
        </div>
      </section>
    </div>

    <script src="./qrcode.min.js"></script>
    <script>
      const FRAME_SIZE = 760;
      const ATLAS_COLS = 12;
      const CENTER_RADIUS = 26;
      const SMOOTHING = 0.92;

      const ANGLE_KEYS = [
        { angle: 0, sourceFrame: 204, spriteIndex: 0, label: "right" },
        { angle: 5, sourceFrame: 206, spriteIndex: 1, label: "right" },
        { angle: 10, sourceFrame: 209, spriteIndex: 2, label: "right" },
        { angle: 15, sourceFrame: 212, spriteIndex: 3, label: "right" },
        { angle: 20, sourceFrame: 215, spriteIndex: 4, label: "right" },
        { angle: 25, sourceFrame: 219, spriteIndex: 5, label: "right-down" },
        { angle: 30, sourceFrame: 223, spriteIndex: 6, label: "right-down" },
        { angle: 35, sourceFrame: 227, spriteIndex: 7, label: "right-down" },
        { angle: 40, sourceFrame: 230, spriteIndex: 8, label: "right-down" },
        { angle: 45, sourceFrame: 232, spriteIndex: 9, label: "right-down" },
        { angle: 50, sourceFrame: 235, spriteIndex: 10, label: "right-down" },
        { angle: 55, sourceFrame: 239, spriteIndex: 11, label: "right-down" },
        { angle: 60, sourceFrame: 242, spriteIndex: 12, label: "down" },
        { angle: 65, sourceFrame: 245, spriteIndex: 13, label: "down" },
        { angle: 70, sourceFrame: 251, spriteIndex: 14, label: "down" },
        { angle: 75, sourceFrame: 257, spriteIndex: 15, label: "down" },
        { angle: 80, sourceFrame: 264, spriteIndex: 16, label: "down" },
        { angle: 85, sourceFrame: 270, spriteIndex: 17, label: "down" },
        { angle: 90, sourceFrame: 276, spriteIndex: 18, label: "down" },
        { angle: 95, sourceFrame: 281, spriteIndex: 19, label: "down" },
        { angle: 100, sourceFrame: 286, spriteIndex: 20, label: "down" },
        { angle: 105, sourceFrame: 290, spriteIndex: 21, label: "down" },
        { angle: 110, sourceFrame: 295, spriteIndex: 22, label: "down" },
        { angle: 115, sourceFrame: 300, spriteIndex: 23, label: "down" },
        { angle: 120, sourceFrame: 305, spriteIndex: 24, label: "down" },
        { angle: 125, sourceFrame: 311, spriteIndex: 25, label: "left-down" },
        { angle: 130, sourceFrame: 316, spriteIndex: 26, label: "left-down" },
        { angle: 135, sourceFrame: 321, spriteIndex: 27, label: "left-down" },
        { angle: 140, sourceFrame: 326, spriteIndex: 28, label: "left-down" },
        { angle: 145, sourceFrame: 331, spriteIndex: 29, label: "left-down" },
        { angle: 150, sourceFrame: 336, spriteIndex: 30, label: "left-down" },
        { angle: 155, sourceFrame: 338, spriteIndex: 31, label: "left-down" },
        { angle: 160, sourceFrame: 340, spriteIndex: 32, label: "left-down" },
        { angle: 165, sourceFrame: 342, spriteIndex: 33, label: "left" },
        { angle: 170, sourceFrame: 344, spriteIndex: 34, label: "left" },
        { angle: 175, sourceFrame: 346, spriteIndex: 35, label: "left" },
        { angle: 180, sourceFrame: 348, spriteIndex: 36, label: "left" },
        { angle: 185, sourceFrame: 352, spriteIndex: 37, label: "left" },
        { angle: 190, sourceFrame: 356, spriteIndex: 38, label: "left" },
        { angle: 195, sourceFrame: 361, spriteIndex: 39, label: "left-up" },
        { angle: 200, sourceFrame: 365, spriteIndex: 40, label: "left-up" },
        { angle: 205, sourceFrame: 369, spriteIndex: 41, label: "left-up" },
        { angle: 210, sourceFrame: 374, spriteIndex: 42, label: "left-up" },
        { angle: 215, sourceFrame: 378, spriteIndex: 43, label: "left-up" },
        { angle: 220, sourceFrame: 382, spriteIndex: 44, label: "left-up" },
        { angle: 225, sourceFrame: 387, spriteIndex: 45, label: "left-up" },
        { angle: 230, sourceFrame: 392, spriteIndex: 46, label: "left-up" },
        { angle: 235, sourceFrame: 397, spriteIndex: 47, label: "left-up" },
        { angle: 240, sourceFrame: 402, spriteIndex: 48, label: "up" },
        { angle: 245, sourceFrame: 407, spriteIndex: 49, label: "up" },
        { angle: 250, sourceFrame: 410, spriteIndex: 50, label: "up" },
        { angle: 255, sourceFrame: 412, spriteIndex: 51, label: "up" },
        { angle: 260, sourceFrame: 415, spriteIndex: 52, label: "up" },
        { angle: 265, sourceFrame: 418, spriteIndex: 53, label: "up" },
        { angle: 270, sourceFrame: 420, spriteIndex: 54, label: "up" },
        { angle: 275, sourceFrame: 420, spriteIndex: 55, label: "up" },
        { angle: 280, sourceFrame: 420, spriteIndex: 56, label: "up" },
        { angle: 285, sourceFrame: 81, spriteIndex: 57, label: "right-up" },
        { angle: 290, sourceFrame: 81, spriteIndex: 58, label: "right-up" },
        { angle: 295, sourceFrame: 86, spriteIndex: 59, label: "right-up" },
        { angle: 300, sourceFrame: 96, spriteIndex: 60, label: "right-up" },
        { angle: 305, sourceFrame: 105, spriteIndex: 61, label: "right-up" },
        { angle: 310, sourceFrame: 114, spriteIndex: 62, label: "right-up" },
        { angle: 315, sourceFrame: 123, spriteIndex: 63, label: "right-up" },
        { angle: 320, sourceFrame: 131, spriteIndex: 64, label: "right-up" },
        { angle: 325, sourceFrame: 140, spriteIndex: 65, label: "right-up" },
        { angle: 330, sourceFrame: 148, spriteIndex: 66, label: "right-up" },
        { angle: 335, sourceFrame: 157, spriteIndex: 67, label: "right-up" },
        { angle: 340, sourceFrame: 166, spriteIndex: 68, label: "right-up" },
        { angle: 345, sourceFrame: 175, spriteIndex: 69, label: "right-up" },
        { angle: 350, sourceFrame: 185, spriteIndex: 70, label: "right" },
        { angle: 355, sourceFrame: 194, spriteIndex: 71, label: "right" },
      ];

      const PALETTE = [
        ["米杏", "#eadfca", "#f7efe1"],
        ["奶油", "#efe3cf", "#fff6e7"],
        ["鼠尾草", "#cfd8c6", "#eef2e8"],
        ["雾蓝", "#c9d4d7", "#edf3f3"],
        ["藕粉", "#dcc9c5", "#f4ebe9"],
        ["灰陶", "#d7d0c2", "#f0ece3"],
      ];

      const canvas = document.querySelector("#cat");
      const ctx = canvas.getContext("2d");
      const label = document.querySelector("#label");
      const detail = document.querySelector("#detail");
      const swatches = document.querySelector("#swatches");
      const colorPicker = document.querySelector("#colorPicker");
      const settingsButton = document.querySelector("#settingsButton");
      const settingsModal = document.querySelector("#settingsModal");
      const closeSettings = document.querySelector("#closeSettings");
      const catName = document.querySelector("#catName");
      const catBirthday = document.querySelector("#catBirthday");
      const catPhone = document.querySelector("#catPhone");
      const profileStrip = document.querySelector("#profileStrip");
      const qrUrl = document.querySelector("#qrUrl");
      const qrCode = document.querySelector("#qrCode");
      const atlasRows = [];
      const front = new Image();
      let loaded = 0;
      const TOTAL_IMAGES = 7;
      let target = null;
      let currentAngle = null;
      let currentLabel = "";
      let lastDrawnAngle = null;

      function circularDistance(a, b) {
        return Math.abs(((a - b + 180) % 360) - 180);
      }

      function nearestKey(angle) {
        return ANGLE_KEYS.reduce((best, item) => {
          return circularDistance(angle, item.angle) < circularDistance(angle, best.angle) ? item : best;
        }, ANGLE_KEYS[0]);
      }

      function drawAtlasFrame(spriteIndex, alpha) {
        const row = Math.floor(spriteIndex / ATLAS_COLS);
        const sx = (spriteIndex % ATLAS_COLS) * FRAME_SIZE;
        const image = atlasRows[row];
        if (!image || !image.complete) {
          return;
        }
        ctx.globalAlpha = alpha;
        ctx.drawImage(image, sx, 0, FRAME_SIZE, FRAME_SIZE, 0, 0, FRAME_SIZE, FRAME_SIZE);
        ctx.globalAlpha = 1;
      }

      function drawFrame(key) {
        ctx.clearRect(0, 0, FRAME_SIZE, FRAME_SIZE);
        if (!key) {
          ctx.drawImage(front, 0, 0, FRAME_SIZE, FRAME_SIZE);
          label.textContent = "center";
          detail.textContent = "frame_front.webp";
          canvas.setAttribute("aria-label", "cat looking forward");
          return;
        }
        drawAtlasFrame(key.spriteIndex, 1);
        label.textContent = key.label;
        detail.textContent = `angle ${key.angle}deg, source frame ${key.sourceFrame}`;
        canvas.setAttribute("aria-label", `cat looking ${key.label}`);
      }

      function drawAngle(angle) {
        const normalized = (angle + 360) % 360;
        const baseIndex = Math.floor(normalized / 5);
        const nextIndex = (baseIndex + 1) % ANGLE_KEYS.length;
        const low = ANGLE_KEYS[baseIndex];
        const high = ANGLE_KEYS[nextIndex];
        const t = (normalized - low.angle) / 5;
        const key = nearestKey(normalized);

        ctx.clearRect(0, 0, FRAME_SIZE, FRAME_SIZE);
        drawAtlasFrame(low.spriteIndex, 1);
        if (t > 0.01) {
          drawAtlasFrame(high.spriteIndex, t);
        }

        if (currentLabel !== `${key.angle}:${key.sourceFrame}`) {
          currentLabel = `${key.angle}:${key.sourceFrame}`;
          label.textContent = key.label;
          detail.textContent = `angle ${Math.round(normalized)}deg, source frame ${key.sourceFrame}`;
          canvas.setAttribute("aria-label", `cat looking ${key.label}`);
        }
      }

      function updateFromPoint(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = clientX - cx;
        const dy = clientY - cy;
        if (Math.hypot(dx, dy) < CENTER_RADIUS) {
          target = null;
          return;
        }
        target = ((Math.atan2(dy, dx) * 180) / Math.PI + 360) % 360;
      }

      function tick() {
        if (target === null) {
          currentAngle = null;
          lastDrawnAngle = null;
          if (currentLabel !== "center") {
            currentLabel = "center";
            drawFrame(null);
          }
        } else {
          if (currentAngle === null) {
            currentAngle = target;
          } else {
            const delta = ((target - currentAngle + 540) % 360) - 180;
            currentAngle = Math.abs(delta) < 0.18 ? target : (currentAngle + delta * SMOOTHING + 360) % 360;
          }
          if (lastDrawnAngle === null || circularDistance(currentAngle, lastDrawnAngle) > 0.08) {
            lastDrawnAngle = currentAngle;
            drawAngle(currentAngle);
          }
        }
        requestAnimationFrame(tick);
      }

      function setTheme(bg, soft = bg) {
        document.documentElement.style.setProperty("--bg", bg);
        document.documentElement.style.setProperty("--bg-soft", soft);
        document.documentElement.style.setProperty("--accent", bg);
        colorPicker.value = bg;
        document.querySelectorAll(".swatch").forEach((button) => {
          button.classList.toggle("active", button.dataset.bg === bg);
        });
      }

      PALETTE.forEach(([name, bg, soft]) => {
        const button = document.createElement("button");
        button.className = "swatch";
        button.type = "button";
        button.title = name;
        button.dataset.bg = bg;
        button.style.background = `linear-gradient(135deg, ${soft}, ${bg})`;
        button.addEventListener("click", () => setTheme(bg, soft));
        swatches.append(button);
      });

      colorPicker.addEventListener("input", (event) => {
        setTheme(event.target.value, "#fffaf0");
      });

      function openSettings() {
        settingsModal.classList.add("open");
        settingsButton.setAttribute("aria-expanded", "true");
        catName.focus();
      }

      function hideSettings() {
        settingsModal.classList.remove("open");
        settingsButton.setAttribute("aria-expanded", "false");
        settingsButton.focus();
      }

      function loadCatProfile() {
        try {
          const saved = JSON.parse(localStorage.getItem("catProfile") || "{}");
          catName.value = saved.name || "";
          catBirthday.value = saved.birthday || "";
          catPhone.value = saved.phone || "";
        } catch {
          catName.value = "";
          catBirthday.value = "";
          catPhone.value = "";
        }
        renderCatProfile();
      }

      function saveCatProfile() {
        localStorage.setItem(
          "catProfile",
          JSON.stringify({
            name: catName.value.trim(),
            birthday: catBirthday.value,
            phone: catPhone.value.trim(),
          }),
        );
        renderCatProfile();
      }

      function formatBirthday(value) {
        if (!value) {
          return "";
        }
        const [year, month, day] = value.split("-");
        return `${year}.${month}.${day}`;
      }

      function renderCatProfile() {
        const items = [
          ["姓名", catName.value.trim()],
          ["生日", formatBirthday(catBirthday.value)],
          ["电话", catPhone.value.trim()],
        ].filter((item) => item[1]);

        if (!items.length) {
          profileStrip.innerHTML = '<span class="profile-item"><strong>卡门</strong><span>资料待填写</span></span>';
          return;
        }

        profileStrip.innerHTML = items
          .map(([key, value]) => `<span class="profile-item"><strong>${key}</strong><span>${escapeHtml(value)}</span></span>`)
          .join("");
      }

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        })[char]);
      }

      function renderQrCode() {
        const url = window.location.href;
        qrUrl.textContent = url;
        qrCode.textContent = "";
        if (window.QRCode) {
          new QRCode(qrCode, {
            text: url,
            width: 148,
            height: 148,
            colorDark: "#2d332e",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M,
          });
        }
      }

      settingsButton.addEventListener("click", openSettings);
      closeSettings.addEventListener("click", hideSettings);
      settingsModal.addEventListener("click", (event) => {
        if (event.target === settingsModal) {
          hideSettings();
        }
      });
      [catName, catBirthday, catPhone].forEach((input) => {
        input.addEventListener("input", saveCatProfile);
      });

      window.addEventListener("pointermove", (event) => {
        updateFromPoint(event.clientX, event.clientY);
      }, { passive: true });

      window.addEventListener("pointerleave", () => {
        target = null;
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && settingsModal.classList.contains("open")) {
          hideSettings();
          return;
        }
        const rect = canvas.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const points = {
          ArrowUp: [cx, rect.top - 120],
          ArrowRight: [rect.right + 120, cy],
          ArrowDown: [cx, rect.bottom + 120],
          ArrowLeft: [rect.left - 120, cy],
          Home: [rect.left - 120, rect.top - 120],
          End: [rect.left - 120, rect.bottom + 120],
          " ": [cx, cy],
        };
        const point = points[event.key];
        if (point) {
          event.preventDefault();
          updateFromPoint(point[0], point[1]);
        }
      });

      function ready() {
        loaded += 1;
        if (loaded === TOTAL_IMAGES) {
          setTheme(PALETTE[0][1], PALETTE[0][2]);
          drawFrame(null);
          requestAnimationFrame(tick);
        }
      }

      front.onload = ready;
      front.src = "./frame_front.webp";
      for (let row = 0; row < 6; row += 1) {
        const image = new Image();
        image.onload = ready;
        image.src = `./sprite-row-${row}.webp`;
        atlasRows.push(image);
      }

      window.__catFineTest = {
        setAngle(angle) {
          target = (angle + 360) % 360;
          currentAngle = target;
          lastDrawnAngle = null;
          drawAngle(target);
        },
        center() {
          target = null;
          currentAngle = null;
          currentLabel = "center";
          drawFrame(null);
        },
      };
      loadCatProfile();
      renderQrCode();
    </script>
  </body>
</html>
